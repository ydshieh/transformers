# To run this bot, comment "@bot /style" on a PR
name: Style Bot

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write

jobs:
  style:
    uses: ./.github/workflows/style-bot-action.yml
    with:
      python_quality_dependencies: "[quality]"
      style_command_type: "default"
    secrets:
      bot_token: ${{ secrets.bonbon }}

  check-outputs:
    runs-on: ubuntu-latest
    needs: style
    steps:
      - run: echo ${{ needs.style.outputs.pr_number }}
      - run: echo ${{ needs.style.outputs.new_commit_sha }}

  trigger:
    needs: style
    if: needs.style.outputs.new_commit_sha != ''
    uses: huggingface/huggingface_hub/.github/workflows/style-bot-action.yml@style_notify
    with:
      pr_number: ${{ needs.style.outputs.pr_number }}
      commit_sha: ${{ needs.style.outputs.new_commit_sha }}
